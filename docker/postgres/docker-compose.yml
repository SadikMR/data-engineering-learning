services:
  postgres:
    image: postgres:17
    container_name: de-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql_practice

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../raw_sql:/sql

volumes:
  postgres_data: